{% extends "layout.html" %}
{% block content %}
<div class="space-y-4">
  <div class="pb-2 border-b border-gray-800 mb-2 px-1">
    <h1 class="text-sm font-bold tracking-wide uppercase text-gray-400">
      Contributions by <span class="text-brand font-display normal-case text-base pl-1">{{ user.username }}</span>
    </h1>
  </div>

  {% for post in posts %}
    <article class="bg-gray-900 border border-gray-800 rounded-2xl p-5 shadow-sm">
      <div class="text-[10px] text-gray-500 mb-2">
        🗓 {{ post.created_at.strftime("%B %d, %Y") }}
      </div>
      <h2 class="text-base font-bold mb-2 text-white hover:text-brand transition-colors">
        <a href="/posts/{{ post.id }}">{{ post.title }}</a>
      </h2>
      <p class="text-xs text-gray-400 leading-relaxed line-clamp-2">{{ post.content }}</p>
    </article>
  {% endfor %}
</div>
{% endblock %}
